name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Dependencies
      run: |
        sudo apt-get install -y libdevel-cover-perl
    - name: Check
      run: |
        perl -c scripts/perl.req
        make testv
        make cover
